name: Publish to PyPI

on:
    release:
        types: [published]

env:
    UV_CACHE_DIR: /tmp/.uv-cache
    PYTHON_VERSION: "3.12"

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true
            - uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
            - name: Build package
              run: uv build
            - name: Publish to PyPI
              run: uv publish
