name: Install neuron deps
description: Install Python dependencies for the NEURON backend (neuroh5 with no-build-isolation)

# neuroh5 is built with no-build-isolation (configured in pyproject.toml) because
# its build requires mpi4py, which must be compiled against the system MPI — a
# prebuilt wheel from an isolated build env would link against the wrong MPI.
#
# However, no-build-isolation means neuroh5's cmake build runs against the project
# venv, and uv does not guarantee that numpy/mpi4py are installed before neuroh5
# is built within a single `uv sync`.
#
# h5py also needs special handling: when built against an MPI-enabled HDF5 (such
# as brew's hdf5-mpi or apt's libhdf5-openmpi-dev), h5py's setup auto-detects
# that HDF5 was compiled with MPI and pulls in <mpi.h>. On macOS, brew installs
# mpi.h under $(brew --prefix open-mpi)/include which is not on clang's default
# search path, so the build fails. The fix is the documented h5py-with-MPI build
# pattern: HDF5_MPI=ON CC=mpicc, which delegates compiler flags to the MPI
# wrapper. This requires mpi4py to already be installed.
#
# The workaround is a four-step install:
#   1. Sync everything except neuroh5 and h5py to create the venv
#   2. Install mpi4py from source (needed for h5py and neuroh5 builds)
#   3. Install h5py with HDF5_MPI=ON CC=mpicc, no-build-isolation
#   4. Install neuroh5 via `uv pip install --no-build-isolation`
#
# The entire .venv is cached to avoid rebuilding mpi4py, h5py, and neuroh5 from
# source on every run. The cache key includes the lockfile, pyproject.toml (for
# override-dependencies), and OS so it invalidates on any dependency change.

runs:
  using: composite
  steps:
    - name: Cache neuron venv
      id: cache-venv
      uses: actions/cache@v5
      with:
        path: .venv
        key: neuron-venv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

    - name: Install Python dependencies (without neuroh5 and h5py)
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      run: |
        uv sync --group dev --group neuron --no-install-package neuroh5 --no-install-package h5py
        uv pip install --no-build-isolation mpi4py

    - name: Install h5py with MPI support (no-build-isolation, needs mpi4py)
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      env:
        HDF5_MPI: "ON"
        CC: mpicc
      run: |
        uv pip install --no-build-isolation --no-binary=h5py h5py

    - name: Install neuroh5 (no-build-isolation, needs venv on PATH for cmake)
      if: steps.cache-venv.outputs.cache-hit != 'true'
      shell: bash
      env:
        Python_ROOT_DIR: ${{ github.workspace }}/.venv
        Python3_ROOT_DIR: ${{ github.workspace }}/.venv
      run: |
        source .venv/bin/activate
        uv pip install --no-build-isolation git+https://github.com/iraikov/neuroh5.git

    - name: Sync venv from cache (fast, no-build packages already present)
      if: steps.cache-venv.outputs.cache-hit == 'true'
      shell: bash
      run: uv sync --group dev --group neuron --no-install-package neuroh5 --no-install-package h5py
